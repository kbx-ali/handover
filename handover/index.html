let syncState = 'offline';
let saveTimer = null;
let pollTimer = null; // kept for compatibility but no longer used

function setSyncState(s) {
  syncState = s;
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  const labels = { offline:'Offline', saving:'Saving…', saved:'Synced ✓', error:'Sync error' };
  el.innerHTML = `<span class="sync-dot ${s}"></span>${labels[s]||s}`;
  const shareBtn = document.getElementById('share-link-btn');
  if (shareBtn) {
    const proj = getActiveProject();
    shareBtn.style.display = (!isReadOnly() && proj) ? '' : 'none';
  }
}

// ─── Firestore save / schedule ─────────────────────────────────
function scheduleSave() {
  clearTimeout(saveTimer);
  setSyncState('saving');
  saveTimer = setTimeout(async () => {
    const proj = getActiveProject();
    if (!proj) return;
    // Ensure a shareToken exists so the plugin can always detect this project
    // on reopen. Without this, handover_sync docs carry shareToken=null until the
    // user clicks "Share", and the plugin falls through to the new-file modal.
    if (!proj.shareToken) {
      proj.shareToken = Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 6);
    }
    await saveProjectToFirestore(proj);
    // Always publish the viewer doc — plugin needs it to load title/theme/sections
    await publishViewerDoc(proj);
    // Write lightweight sync beacon(s) so the Figma plugin can detect changes.
    // We write by BOTH fileKey and pluginSyncId — the plugin checks whichever it has.
    const syncPayload = {
      updatedAt:   firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy:   currentUser?.displayName || currentUser?.email || 'A teammate',
      shareToken:  proj.shareToken
    };
    const fkMatch = proj.generalData?.figmaFileUrl?.match(/figma\.com\/(?:design|file)\/([^\/\?#]+)/);
    const fk = fkMatch ? fkMatch[1] : null;
    if (fk) {
      db.collection('handover_sync').doc(fk).set(syncPayload).catch(e => console.warn('[Sync] fk write failed:', e));
    }
    if (proj.pluginSyncId) {
      db.collection('handover_sync').doc(proj.pluginSyncId).set(syncPayload).catch(e => console.warn('[Sync] syncId write failed:', e));
    }
    setSyncState('saved');
  }, 900);
}

// ─── Public viewer doc (Firestore — no auth required to read) ──
async function publishViewerDoc(proj) {
  if (!proj.shareToken) return;
  try {
    await db.collection('handover_public').doc(proj.shareToken).set({
      title:         proj.title,
      theme:         proj.theme,
      activePage:    proj.activePage,
      pages:         proj.pages,
      customPages:   proj.customPages || [],
      generalData:   proj.generalData,
      frameMappings: proj.frameMappings || {},
      updatedAt:     firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) {
    console.error('Publish viewer doc error:', e);
  }
}

// ─── Load viewer data (no auth) ────────────────────────────────
async function loadViewerData(shareToken) {
  try {
    const doc = await db.collection('handover_public').doc(shareToken).get();
    if (!doc.exists) return false;
    const data = doc.data();
    projectMeta.title = data.title || '';
    projectMeta.theme = data.theme || '';
    activePage = data.activePage || 'homepage';
    if (data.pages) {
      Object.keys(data.pages).forEach(k => {
        if (!pages[k]) pages[k] = { loomUrl: '', figmaUrl: '', sections: [] };
        const pg = data.pages[k];
        pages[k].loomUrl  = pg.loomUrl  || '';
        pages[k].figmaUrl = pg.figmaUrl || '';
        if (Array.isArray(pg.sections)) {
          pages[k].sections = pg.sections.map((s, idx) => ({ ...s, id: String(s.id), collapsed: idx > 0 }));
        }
      });
    }
    generalData = data.generalData || { figmaFileUrl:'', driveUrl:'', fonts:[], typography:[] };
    if (!generalData.driveUrl) generalData.driveUrl = '';
    // Normalize section fields (backward compat)
    Object.values(pages).forEach(pg => { (pg.sections||[]).forEach(s => {
      if (!s.driveUrl) s.driveUrl = '';
      if (!s.assets)   s.assets   = [];
    }); });
    applyProjectMeta();
    render();
    return true;
  } catch(e) {
    console.error('Viewer load error:', e);
    return false;
  }
}

// ─── Share URL helper ──────────────────────────────────────────
async function getOrCreateShareToken(proj) {
  if (proj.shareToken) return proj.shareToken;
  const token = Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 6);
  proj.shareToken = token;
  await saveProjectToFirestore(proj);
  await publishViewerDoc(proj);
  return token;
}

function getShareUrl(shareToken) {
  const base = `${location.origin}${location.pathname}`;
  return `${base}?view=${shareToken}`;
}

async function addEditor() {
  const input = document.getElementById('new-editor-email');
  const errEl = document.getElementById('editor-settings-err');
  const email = input?.value.trim().toLowerCase();
  if (!email) return;
  if (!email.endsWith('@kubixmedia.co.uk')) {
    errEl.textContent = 'Only @kubixmedia.co.uk emails are allowed.';
    errEl.style.display = 'block';
    return;
  }
  if (editorEmails.includes(email)) {
    errEl.textContent = 'This email is already an editor.';
    errEl.style.display = 'block';
    return;
  }
  editorEmails.push(email);
  await saveEditorList();
  document.querySelector('.overlay')?.remove();
  openEditorSettingsModal();
}

async function removeEditor(email) {
  email = email.toLowerCase();
  if (email === currentUser?.email?.toLowerCase()) {
    if (!confirm('Remove yourself? You will lose edit access.')) return;
  }
  editorEmails = editorEmails.filter(e => e !== email);
  await saveEditorList();
  if (!checkIsEditor(currentUser?.email)) {
    IS_EDITOR = false;
    document.documentElement.classList.add('viewer-mode');
    document.querySelector('.overlay')?.remove();
    renderLibrary();
    return;
  }
  document.querySelector('.overlay')?.remove();
  openEditorSettingsModal();
}

async function saveEditorList() {
  try {
    await db.collection('handover_settings').doc('editors').set({
      emails: editorEmails,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy: currentUser?.email || ''
    });
  } catch (e) {
    console.error('Failed to save editor list:', e);
  }
}

async function testClickUpToken() {
  const btn = document.getElementById('cu-test-btn');
  const status = document.getElementById('cu-token-status');
  const token = document.getElementById('cu-token')?.value.trim();
  if (!token) { status.textContent = 'Enter a token first.'; status.style.color = '#F87171'; return; }
  btn.disabled = true; btn.textContent = 'Testing…';
  localStorage.setItem('clickup_api_token', token);
  try {
    const data = await clickupApi.getUser();
    const name = data?.user?.username || data?.user?.email || 'Unknown';
    status.textContent = '✓ Connected as ' + name;
    status.style.color = 'var(--kbx-mint)';
  } catch (e) {
    status.textContent = e.message;
    status.style.color = '#F87171';
    localStorage.removeItem('clickup_api_token');
  } finally {
    btn.disabled = false; btn.textContent = 'Test';
  }
}

function saveClickUpToken() {
  const token = document.getElementById('cu-token')?.value.trim();
  if (token) { localStorage.setItem('clickup_api_token', token); }
  else { localStorage.removeItem('clickup_api_token'); }
  document.querySelector('.overlay')?.remove();
  showToast('ClickUp token saved', 'success');
}

async function loadClickUpWorkspaces() {
  const workspaceInput = document.getElementById('cu-workspace');
  const spaceSel = document.getElementById('cu-space');
  if (!workspaceInput || !spaceSel) return;
  spaceSel.innerHTML = '<option value="">Loading spaces…</option>';
  try {
    const data = await clickupApi.getTeams();
    const teams = data?.teams || [];
    if (!teams.length) { spaceSel.innerHTML = '<option value="">No workspaces found</option>'; return; }
    workspaceInput.value = teams[0].id;
    const spaceData = await clickupApi.getSpaces(teams[0].id);
    const spaces = spaceData?.spaces || [];
    spaceSel.innerHTML = '<option value="">— select space —</option>' +
      spaces.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
  } catch (e) {
    spaceSel.innerHTML = '<option value="">Error loading spaces</option>';
  }
}

async function onClickUpSpaceChange() {

  const folderSel = document.getElementById('cu-folder');
  const listSel = document.getElementById('cu-list');
  listSel.innerHTML = '<option value="">— select a folder first —</option>';
  if (!spaceId) { folderSel.innerHTML = '<option value="">— select a space first —</option>'; return; }
  folderSel.innerHTML = '<option value="">Loading folders…</option>';
  try {
    const data = await clickupApi.getFolders(spaceId);
    const folders = data?.folders || [];
    folderSel.innerHTML = '<option value="">— select folder —</option>' +
      folders.map(f => `<option value="${f.id}">${esc(f.name)}</option>`).join('');

    folderSel.innerHTML = '<option value="">Error loading folders</option>';

}

async function onClickUpFolderChange() {
  const folderId = document.getElementById('cu-folder')?.value;
  const spaceId  = document.getElementById('cu-space')?.value;
  const listSel  = document.getElementById('cu-list');
  if (!spaceId) return;
  // Reset phase/assignee while list is loading
  const phaseSel   = document.getElementById('cu-phase');
  const assigneeSel = document.getElementById('cu-assignee');
  if (phaseSel)    phaseSel.innerHTML    = '<option value="">— select a list first —</option>';
  if (assigneeSel) assigneeSel.innerHTML = '<option value="">— select a list first —</option>';
  listSel.innerHTML = '<option value="">Loading lists…</option>';
  try {
    const data = folderId
      ? await clickupApi.getLists(folderId)
      : await clickupApi.getFolderlessLists(spaceId);
    const lists = data?.lists || [];
    listSel.innerHTML = '<option value="">— select list —</option>' +
      lists.map(l => `<option value="${l.id}">${esc(l.name)}</option>`).join('');
  } catch (e) {
    listSel.innerHTML = '<option value="">Error loading lists</option>';
  }
}

async function onClickUpListChange() {
  const listId = document.getElementById('cu-list')?.value;
  if (!listId) return;
  loadClickUpExtraFields(listId);
}

async function loadClickUpExtraFields(listId) {
  if (!listId) return;
  const phaseSel     = document.getElementById('cu-phase');
  const phaseFieldId = document.getElementById('cu-phase-field-id');
  const assigneeSel  = document.getElementById('cu-assignee');
  if (!phaseSel || !assigneeSel) return;

  phaseSel.innerHTML    = '<option value="">Loading…</option>';
  assigneeSel.innerHTML = '<option value="">Loading…</option>';

  const proj = getActiveProject();
  const savedPhaseValueId = proj?.clickup?.phaseValueId || '';
  const savedAssigneeId   = proj?.clickup?.assigneeId ? String(proj.clickup.assigneeId) : '';

  // Fetch fields + members in parallel
  const [fieldsResult, membersResult] = await Promise.allSettled([
    clickupApi.getListFields(listId),
    clickupApi.getMembers()
  ]);

  // ── Project Phase ──
  if (fieldsResult.status === 'fulfilled') {
    const fields = fieldsResult.value?.fields || [];
    const phaseField = fields.find(f => f.type === 'drop_down' && /phase/i.test(f.name))
                    || fields.find(f => f.type === 'drop_down');
    if (phaseField) {
      if (phaseFieldId) phaseFieldId.value = phaseField.id;
      const options = phaseField.type_config?.options || [];
      phaseSel.innerHTML = '<option value="">— select phase —</option>' +
        options.map(o => `<option value="${o.id}" ${o.id === savedPhaseValueId ? 'selected' : ''}>${esc(o.name)}</option>`).join('');
    } else {
      phaseSel.innerHTML = '<option value="">No phase field on this list</option>';
      if (phaseFieldId) phaseFieldId.value = '';
    }
  } else {
    phaseSel.innerHTML = '<option value="">Could not load fields</option>';
  }

  // ── Assignee ──
  if (membersResult.status === 'fulfilled' && membersResult.value) {
    const members = membersResult.value?.members || [];
    assigneeSel.innerHTML = '<option value="">— no assignee —</option>' +
      members.map(m => {
        const u = m.user || m;
        return `<option value="${u.id}" ${String(u.id) === savedAssigneeId ? 'selected' : ''}>${esc(u.username || u.email)}</option>`;
      }).join('');
  } else {
    assigneeSel.innerHTML = '<option value="">Could not load members</option>';
  }
}

// ─── Clipboard helper (works even when document not focused) ───
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { const ok = document.execCommand('copy'); document.body.removeChild(ta); return ok; }
  catch(e) { document.body.removeChild(ta); return false; }
}

function copyToClipboard(text, btn) {
  const origHTML = btn ? btn.innerHTML : '';
  if (btn && !btn.dataset.origLabel) btn.dataset.origLabel = btn.textContent;

  const succeed = () => {
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => { btn.innerHTML = origHTML; delete btn.dataset.origLabel; }, 2000); }
  };
  const fail = () => {
    // Select the nearby input so user can Cmd+C manually
    const inp = btn?.closest('.url-copy-row')?.querySelector('input') || document.getElementById('share-url-input');
    if (inp) { inp.focus(); inp.select(); }
    if (btn) { btn.textContent = '⌘C to copy'; setTimeout(() => { btn.innerHTML = origHTML; delete btn.dataset.origLabel; }, 3000); }
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(succeed).catch(() => fallbackCopy(text) ? succeed() : fail());
  } else {
    fallbackCopy(text) ? succeed() : fail();
  }
}

// ─── ClickUp CSV export ─────────────────────────────────────────
function exportToClickUp(btn) {
  const proj = getActiveProject();
  if (!proj) return;

  const statusTag    = { existing: 'existing section', modified: 'needs new settings', bespoke: 'custom-dev' };
  const projName     = proj.title || 'Untitled Project';
  const pageLabelMap = { homepage: 'HOMEPAGE', collection: 'COLLECTION PAGE', product: 'PRODUCT PAGE' };

  function csvCell(val) {
    const s = (val == null ? '' : String(val));
    if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  const rows = [['Task Name', 'Task Content', 'Status', 'Priority', 'tags', 'List']];

  ['homepage', 'collection', 'product'].forEach(key => {
    const pg = proj.pages[key];
    if (!pg) return;
    const def = PAGE_DEFS[key];
    if (!def) return;
    const sections = pg.sections || [];
    if (sections.length === 0) return;

    // Page task — capitalised label + project name
    const parentName    = (pageLabelMap[key] || def.label.toUpperCase()) + ' - ' + projName;
    const parentContent = [
      pg.figmaUrl ? 'Figma: ' + pg.figmaUrl : '',
      pg.loomUrl  ? 'Loom: '  + pg.loomUrl  : ''
    ].filter(Boolean).join('\n');

    rows.push([parentName, parentContent, 'Open', '', '', projName]);

    // Section tasks — flat, manual subtask conversion in ClickUp
    sections.forEach(s => {
      const content = [
        sectionNotes(s),
        s.figmaLink ? 'Figma: ' + s.figmaLink : ''
      ].filter(Boolean).join('\n\n');

      rows.push([s.name, content, 'Open', '', statusTag[s.status] || '', projName]);
    });
  });

  // Build CSV (UTF-8 BOM so Excel opens it correctly)
  const csv = '\ufeff' + rows.map(r => r.map(csvCell).join(',')).join('\r\n');

  // Trigger browser download
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = (proj.title || 'checklist').replace(/[^a-z0-9]+/gi, '-').toLowerCase() + '-clickup-import.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Brief "Downloaded ✓" feedback
  if (btn) {
    const orig = btn.innerHTML;
    btn.innerHTML = '<iconify-icon icon="pixelarticons:check" style="font-size:14px"></iconify-icon> Downloaded ✓';
    btn.disabled = true;
    setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 2200);
  }
}

// ─── Push to ClickUp (API) ──────────────────────────────────────
async function pushToClickUp(btn) {
  const proj = getActiveProject();
  if (!proj) return;

  const token = clickupApi.token();
  const listId = getClickUpListId();
  if (!token) {
    showToast('Add your ClickUp API token in Settings first', 'error');
    openClickUpSettingsModal();
    return;
  }
  if (!listId) {
    // No list chosen yet — open the project list picker; it will call pushToClickUp again after saving
    openClickUpListModal(true);
    return;
  }

  const statusTag = { existing: 'existing section', modified: 'needs new settings', bespoke: 'custom-dev' };
  const projName = proj.title || 'Untitled Project';
  const pageLabelMap = { homepage: 'HOMEPAGE', collection: 'COLLECTION PAGE', product: 'PRODUCT PAGE', aboutus: 'ABOUT US', contactus: 'CONTACT US' };

  // Project Phase + Assignee stored on project
  const phaseFieldId  = proj.clickup?.phaseFieldId  || null;
  const phaseValueId  = proj.clickup?.phaseValueId  || null;
  const assigneeId    = proj.clickup?.assigneeId    || null;
  const assignees     = assigneeId ? [assigneeId] : [];

  // Ensure clickup metadata object exists on project
  if (!proj.clickup) proj.clickup = { pages: {} };
  if (!proj.clickup.pages) proj.clickup.pages = {};

  // All page keys that have sections — includes custom pages
  const allPageKeys = Object.keys(proj.pages || {}).filter(k => (proj.pages[k]?.sections?.length || 0) > 0);

  // Button loading state
  let origHtml;
  if (btn) {
    origHtml = btn.innerHTML;
    btn.innerHTML = '<iconify-icon icon="pixelarticons:loader" style="font-size:14px;animation:spin 1s linear infinite"></iconify-icon> Pushing…';
    btn.disabled = true;
  }

  let created = 0, updated = 0, deleted = 0, errors = 0;

  // IDs from the PREVIOUS push (stored on proj) — used to detect sections that
  // have since been deleted from the app and need removing from ClickUp.
  const prevSectionTaskIds = new Set(proj.clickup.sectionTaskIds || []);

  // IDs that are still active in the current project
  const currentSectionTaskIds = new Set(
    allPageKeys.flatMap(k =>
      (proj.pages[k]?.sections || []).map(s => s.clickupTaskId).filter(Boolean)
    )
  );

  // Truly orphaned: existed in the previous push but are no longer in any section
  const orphanedTaskIds = [...prevSectionTaskIds].filter(id => !currentSectionTaskIds.has(id));

  try {
    for (const key of allPageKeys) {
      const pg = proj.pages[key];
      if (!pg) continue;
      const sections = pg.sections || [];
      if (sections.length === 0) continue;

      // ── Page-level parent task ──
      const keyLabel = pageLabelMap[key] || (proj.customPages?.find(p => p.key === key)?.label || key).toUpperCase();
      const parentName = keyLabel + ' - ' + projName;
      const parentContent = [
        pg.figmaUrl ? 'Figma: ' + pg.figmaUrl : '',
        pg.loomUrl  ? 'Loom: '  + pg.loomUrl  : ''
      ].filter(Boolean).join('\n');

      const existingPageTaskId = proj.clickup.pages[key]?.taskId;

      if (existingPageTaskId) {
        // Update existing page task
        try {
          await clickupApi.updateTask(existingPageTaskId, {
            name: parentName,
            description: parentContent
          });
          updated++;
        } catch (e) {
          if (e.status === 404) {
            // Task was deleted in ClickUp — create fresh
            proj.clickup.pages[key] = {};
          } else { errors++; console.error('ClickUp update page task error:', e); continue; }
        }
      }

      // Create if no ID or if it was cleared due to 404
      if (!proj.clickup.pages[key]?.taskId) {
        try {
          const res = await clickupApi.createTask(listId, {
            name: parentName,
            description: parentContent,
            status: 'to do',
            ...(assignees.length ? { assignees } : {})
          });
          proj.clickup.pages[key] = { taskId: res.id };
          // Set Project Phase custom field on the new parent task
          if (phaseFieldId && phaseValueId) {
            clickupApi.setCustomField(res.id, phaseFieldId, phaseValueId).catch(() => {});
          }
          created++;
        } catch (e) { errors++; console.error('ClickUp create page task error:', e); continue; }
      }

      const pageTaskId = proj.clickup.pages[key].taskId;

      // ── Section subtasks ──
      for (const s of sections) {
        const content = [
          sectionNotes(s),
          s.figmaLink ? 'Figma: ' + s.figmaLink : ''
        ].filter(Boolean).join('\n\n');

        const tags = statusTag[s.status] ? [statusTag[s.status]] : [];

        if (s.clickupTaskId) {
          // Update existing section task — refresh description, tags, assignee
          try {
            await clickupApi.updateTask(s.clickupTaskId, {
              name: s.name,
              description: content,
              ...(assignees.length ? { assignees } : {})
            });
            // Re-apply phase field on update too
            if (phaseFieldId && phaseValueId) {
              clickupApi.setCustomField(s.clickupTaskId, phaseFieldId, phaseValueId).catch(() => {});
            }
            updated++;
          } catch (e) {
            if (e.status === 404) {
              s.clickupTaskId = null; // cleared — will create below
            } else { errors++; console.error('ClickUp update section error:', e); continue; }
          }
        }

        if (!s.clickupTaskId) {
          // Create new section subtask
          try {
            const res = await clickupApi.createTask(listId, {
              name: s.name,
              description: content,
              parent: pageTaskId,
              tags,
              status: 'to do',
              ...(assignees.length ? { assignees } : {})
            });
            s.clickupTaskId = res.id;
            if (phaseFieldId && phaseValueId) {
              clickupApi.setCustomField(res.id, phaseFieldId, phaseValueId).catch(() => {});
            }
            created++;
          } catch (e) { errors++; console.error('ClickUp create section error:', e); }
        }
      }
    }

    // ── Delete ClickUp tasks for sections removed from the app ──────
    for (const taskId of orphanedTaskIds) {
      try {
        await clickupApi.deleteTask(taskId);
        deleted++;
      } catch (e) {
        if (e.status === 404) { deleted++; } // already gone — count as deleted
        else { errors++; console.error('ClickUp delete orphaned task error:', taskId, e); }
      }
    }

    // Save ClickUp IDs back to Firestore — including the updated known ID list
    proj.clickup.listId = listId;
    proj.clickup.listLabel = getClickUpListLabel();
    proj.clickup.pushedAt = new Date().toISOString();
    // Store current section task IDs so the next push can detect future deletions
    proj.clickup.sectionTaskIds = allPageKeys.flatMap(k =>
      (proj.pages[k]?.sections || []).map(s => s.clickupTaskId).filter(Boolean)
    );
    await saveProjectToFirestore(proj);

    // ── Critical: sync clickupTaskIds back into the local `pages` copy ──
    // `pages` is a deep-copy made at project open time, separate from proj.pages.
    // Without this, the next autosave would overwrite Firestore with the copy
    // that has no IDs, wiping them and causing duplicates on the next push.
    // Use ID-based matching (not array index) so reordered/added sections stay correct.
    allPageKeys.forEach(key => {
      if (!pages[key]) return;
      const idMap = {};
      (proj.pages[key]?.sections || []).forEach(s => {
        if (s.id && s.clickupTaskId) idMap[s.id] = s.clickupTaskId;
      });
      (pages[key].sections || []).forEach(localSec => {
        if (localSec.id && idMap[localSec.id]) localSec.clickupTaskId = idMap[localSec.id];
      });
    });

    // Success feedback
    const parts = [];
    if (created)  parts.push(created  + ' created');
    if (updated)  parts.push(updated  + ' updated');
    if (deleted)  parts.push(deleted  + ' removed');
    if (errors)   parts.push(errors   + ' failed');
    showToast('ClickUp: ' + (parts.join(', ') || 'no changes'), errors ? 'error' : 'success');

  } catch (e) {
    console.error('ClickUp push error:', e);
    showToast('ClickUp push failed: ' + e.message, 'error');
  } finally {
    if (btn) {
      const hasIds = proj.clickup?.pages && Object.values(proj.clickup.pages).some(p => p?.taskId);
      btn.innerHTML = hasIds
        ? '<svg width="13" height="13" viewBox="0 0 54.8 65.8" style="flex-shrink:0"><defs><linearGradient id="cu-a2" x1="0" y1="15" x2="54.8" y2="15" gradientTransform="matrix(1 0 0 -1 0 69.4)" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#8930fd"/><stop offset="1" stop-color="#49ccf9"/></linearGradient><linearGradient id="cu-b2" x1="1.2" y1="53.2" x2="53.7" y2="53.2" gradientTransform="matrix(1 0 0 -1 0 69.4)" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ff02f0"/><stop offset="1" stop-color="#ffc800"/></linearGradient></defs><path fill="url(#cu-a2)" d="M0,50.6l10.1-7.8c5.4,7,11.1,10.3,17.4,10.3c6.3,0,11.9-3.2,17-10.2l10.3,7.6c-7.4,10-16.6,15.3-27.3,15.3C16.9,65.8,7.6,60.5,0,50.6z"/><path fill="url(#cu-b2)" d="M27.5,16.9l-18,15.5l-8.3-9.7L27.6,0l26.2,22.7l-8.4,9.6L27.5,16.9z"/></svg> Update ClickUp'
        : origHtml;
      btn.disabled = false;
    }
    render();
  }
}

// ─── Drag & drop ───────────────────────────────────────────────
let dragId = null;
function onDragStart(e, id) {
  dragId = id; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', String(id));
  requestAnimationFrame(() => document.querySelector(`.card[data-id="${id}"]`)?.classList.add('dragging'));
}
function onDragOver(e, id) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
  if (id !== dragId) document.querySelector(`.card[data-id="${id}"]`)?.classList.add('drag-over');
}
function onDragLeave(e, id) { document.querySelector(`.card[data-id="${id}"]`)?.classList.remove('drag-over'); }
function onDrop(e, targetId) {
  e.preventDefault();
  document.querySelectorAll('.card').forEach(c => { c.classList.remove('drag-over'); c.classList.remove('dragging'); });
  if (dragId == null || dragId === targetId) return;
  const secs = curSections();
  const si = secs.findIndex(s => String(s.id) === String(dragId));
  const ti = secs.findIndex(s => String(s.id) === String(targetId));
  if (si < 0 || ti < 0) return;
  const [m] = secs.splice(si, 1); secs.splice(ti, 0, m);
  dragId = null; savePagesData(); render(); scheduleSave();
}
function onDragEnd() {
  document.querySelectorAll('.card').forEach(c => { c.classList.remove('dragging'); c.classList.remove('drag-over'); });
  dragId = null;
}

// ─── Pull ClickUp statuses back ────────────────────────────────
async function pullClickUpStatuses(btn) {
  const proj = getActiveProject();
  if (!proj) return;

  const token = clickupApi.token();
  if (!token) { showToast('Add your ClickUp API token in Settings first', 'error'); return; }

  // Collect all stored task IDs
  const tasks = [];
  for (const key of ['homepage', 'collection', 'product']) {
    const pageTaskId = proj.clickup?.pages?.[key]?.taskId;
    if (pageTaskId) tasks.push({ type: 'page', pageKey: key, taskId: pageTaskId });
    const sections = proj.pages?.[key]?.sections || [];
    for (const s of sections) {
      if (s.clickupTaskId) tasks.push({ type: 'section', pageKey: key, sectionId: s.id, taskId: s.clickupTaskId });
    }
  }

  if (tasks.length === 0) { showToast('No ClickUp tasks found — push to ClickUp first', 'error'); return; }

  // Button loading state
  let origHtml;
  if (btn) { origHtml = btn.innerHTML; btn.innerHTML = '<iconify-icon icon="pixelarticons:loader" style="font-size:14px;animation:spin 1s linear infinite"></iconify-icon> Pulling\u2026'; btn.disabled = true; }

  let fetched = 0, errors = 0;
  const BATCH = 5;
  for (let i = 0; i < tasks.length; i += BATCH) {
    const batch = tasks.slice(i, i + BATCH);
    const results = await Promise.allSettled(
      batch.map(t => clickupApi.getTask(t.taskId).then(data => ({ ...t, data })))
    );
    for (const r of results) {
      if (r.status === 'fulfilled') {
        const { type, pageKey, sectionId, data } = r.value;
        const statusName = data.status?.status || '';
        if (type === 'page') {
          if (!proj.clickup.pages[pageKey]) proj.clickup.pages[pageKey] = {};
          proj.clickup.pages[pageKey].devStatus = statusName;
          if (pages[pageKey]) pages[pageKey].devStatus = statusName;
        } else {
          const localSec = (pages[pageKey]?.sections || []).find(s => s.id === sectionId || s.id === Number(sectionId));
          if (localSec) localSec.devStatus = statusName;
          const projSec = (proj.pages[pageKey]?.sections || []).find(s => s.id === sectionId || s.id === Number(sectionId));
          if (projSec) projSec.devStatus = statusName;
        }
        fetched++;
      } else {
        errors++;
        console.warn('ClickUp status pull error:', r.reason);
      }
    }
  }

  proj.clickup.pulledAt = new Date().toISOString();
  await saveProjectToFirestore(proj);
  if (proj.shareToken) { try { await publishViewerDoc(proj); } catch(e) { console.warn('Viewer publish error:', e); } }

  render();

  if (btn) { btn.innerHTML = origHtml; btn.disabled = false; }

  if (errors === 0) {
    showToast(`Synced ${fetched} task status${fetched !== 1 ? 'es' : ''} from ClickUp`, 'success');
  } else {
    showToast(`Synced ${fetched} statuses, ${errors} failed`, 'error');
  }
}

// ─── Helpers ───────────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
function counts() { const c={existing:0,modified:0,bespoke:0}; curSections().forEach(s=>c[s.status]++); return c; }

// ─── Render ────────────────────────────────────────────────────
function render() {
  // Defer page-specific data until after early-return for 'general'
  const isGeneral = activePage === 'general';
  const secs     = isGeneral ? [] : curSections();
  const pg       = isGeneral ? null : curPage();
  const c        = isGeneral ? {existing:0,modified:0,bespoke:0} : counts();
  const total    = secs.length;
  const filtered = activeFilter === 'all' ? secs : secs.filter(s => s.status === activeFilter);
  const pct = k => total ? (c[k]/total*100).toFixed(1) : 0;
  const _customDef = customPages.find(p => p.key === activePage);
  const def  = PAGE_DEFS[activePage] || { label: _customDef?.label || activePage, icon: 'pixelarticons:document', sections: [] };

  let html = '';

  /* ── Page tabs ── */
  html += `<div class="page-tabs">`;
  const renderPageTab = (k, label, icon, isCustom) => {
    const isActive    = k === activePage;
    const count       = pages[k]?.sections?.length ?? 0;
    const hasLoom     = !!pages[k]?.loomUrl;
    const pgDevStatus = pages[k]?.devStatus || '';
    const pgDotVar    = clickupStatusDotVar(pgDevStatus);
    const pgDevLabel  = pgDevStatus ? (CLICKUP_STATUS_MAP[pgDevStatus.toLowerCase().trim()]?.label || pgDevStatus) : '';
    return `<button class="page-tab${isActive?' active':''}" onclick="switchPage('${k}')">
      <iconify-icon icon="${icon}" class="page-tab-icon" style="font-size:14px"></iconify-icon>
      ${esc(label)}
      ${hasLoom ? '<span class="page-tab-loom-dot" title="Has Loom video"></span>' : ''}
      <span class="page-tab-count">${count}</span>
      ${pgDotVar ? `<span class="page-tab-cu-dot" style="background:var(${pgDotVar})" title="${pgDevLabel}"></span>` : ''}
      ${isCustom && IS_EDITOR ? `<span class="page-tab-remove" onclick="event.stopPropagation();removeCustomPage('${k}')" title="Remove tab">×</span>` : ''}
    </button>`;
  };
  // Core tabs — visible unless explicitly hidden by plugin (no sections + not in activeTabs)
  const _hiddenCore = new Set(getActiveProject()?.hiddenCorePages || []);
  CORE_PAGE_KEYS.forEach(k => {
    if (_hiddenCore.has(k)) return;
    const d = PAGE_DEFS[k];
    html += renderPageTab(k, d.label, d.icon, false);
  });
  // Custom tabs — only when added to this project
  customPages.forEach(({ key, label }) => {
    const def = PAGE_DEFS[key];
    html += renderPageTab(key, def?.label || label || key, def?.icon || 'pixelarticons:document', true);
  });
  // + button — always shown to editors (they can always add more)
  if (IS_EDITOR) {
    html += `<button class="page-tab-add" onclick="openAddTabMenu(this)" title="Add page tab">+</button>`;
  }
  // General tab — sitewide settings
  html += `<button class="page-tab${'general'===activePage?' active':''}" onclick="switchPage('general')" style="margin-left:auto;">
    <iconify-icon icon="pixelarticons:settings" class="page-tab-icon" style="font-size:14px"></iconify-icon>
    General
    <span class="page-tab-count">${generalData.fonts.length || ''}</span>
  </button>`;
  html += `</div>`;

  /* ── ClickUp sync bar ── */
  if (!isReadOnly()) {
    const cuProj      = getActiveProject();
    const cuLabel     = getClickUpListLabel();

// ─── Mutations ─────────────────────────────────────────────────
function toggleSection(id) {
  id = String(id);
  const s = curSections().find(s => String(s.id) === id);
  if (s) s.collapsed = !s.collapsed;
  render();
}
function setField(id, key, val) {
  if (!IS_EDITOR) return;
  const s = curSections().find(s => String(s.id) === String(id));
  if (s) s[key] = val;
  if (key !== 'notes') render();
  savePagesData(); scheduleSave();
}
function sectionNotes(s) {
  const base = s.notes || '';
  if (s.useThemeSpacing !== false) {
    return base ? base + '\n\nUse Existing Theme Structure & Spacing' : 'Use Existing Theme Structure & Spacing';
  }
  return base;
}
function saveNotesField(id, val) {
  // Strip the auto-appended theme spacing text before saving
  val = val.replace(/\n\nUse Existing Theme Structure & Spacing$/, '').replace(/^Use Existing Theme Structure & Spacing$/, '');
  setField(id, 'notes', val);
}
function setFilter(f) { activeFilter = f; render(); }

function addSection() {
  if (!IS_EDITOR) return;
  const secs  = curSections();
  const newId = generateId();
  secs.push({ id:newId, name:"New Section", status:"existing", useThemeSpacing: true, notes:"", figmaLink:"", driveUrl:"", assets:[], collapsed:false });
  savePagesData(); render(); scheduleSave();
  requestAnimationFrame(() => document.querySelector(`.card[data-id="${newId}"]`)?.scrollIntoView({ behavior:'smooth', block:'nearest' }));
}

function removeSection(id) {
  if (!IS_EDITOR) return;
  if (!confirm('Remove this section from the checklist?')) return;
  pages[activePage].sections = curSections().filter(s => String(s.id) !== String(id));
  savePagesData(); render(); scheduleSave();
}

// ─── Toast notifications ───────────────────────────────────────
let _toastTimer;
function showToast(msg, type = 'info') {
  let el = document.getElementById('app-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'app-toast';
    el.className = 'toast';
    document.body.appendChild(el);
  }
  clearTimeout(_toastTimer);
  el.className = 'toast ' + type;
  el.textContent = msg;
  requestAnimationFrame(() => el.classList.add('show'));
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ─── Google Drive asset upload (same pattern as CRO app) ───────
let driveAccessToken = null;

function extractDriveFolderId(url) {
  if (!url) return '';
  const s = url.trim();
  if (/^[a-zA-Z0-9_-]{20,}$/.test(s)) return s;
  const m = s.match(/folders\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : '';
}

async function ensureDriveToken() {
  if (driveAccessToken) {
    try {
      const r = await fetch('https://www.googleapis.com/drive/v3/about?fields=user', {
        headers: { Authorization: `Bearer ${driveAccessToken}` }
      });
      if (r.ok) return driveAccessToken;
    } catch(e) { /* token expired — fall through */ }
  }
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope('https://www.googleapis.com/auth/drive');
  provider.setCustomParameters({ hd: 'kubixmedia.co.uk' });
  try {
    const result = await auth.signInWithPopup(provider);
    if (result.credential?.accessToken) {
      driveAccessToken = result.credential.accessToken;
      return driveAccessToken;
    }
    throw new Error('No access token returned');
  } catch(e) {
    if (e.code === 'auth/popup-closed-by-user') throw new Error('Sign-in cancelled');
    throw new Error('Could not get Drive access: ' + (e.message || e.code));
  }
}

async function uploadFileToDrive(file, folderId, accessToken) {
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify({ name: file.name, parents: [folderId] })], { type: 'application/json' }));
  form.append('file', file);
  const res = await fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink&supportsAllDrives=true',
    { method: 'POST', headers: { Authorization: `Bearer ${accessToken}` }, body: form }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Upload failed (${res.status})`);
  }
  const fileData = await res.json();
  // Make public — "anyone with link can view"
  await fetch(`https://www.googleapis.com/drive/v3/files/${fileData.id}/permissions?supportsAllDrives=true`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ role: 'reader', type: 'anyone' })
  }).catch(() => {}); // non-fatal — file is still uploaded
  return fileData;
}

function getActiveFolderId(sectionId) {
  const s = curSections().find(s => String(s.id) === String(sectionId));
  const folderUrl = (s?.driveUrl) || generalData.driveUrl || '';
  return extractDriveFolderId(folderUrl);
}

function assetDragOver(e, id) { e.preventDefault(); document.getElementById(`adz-${id}`)?.classList.add('adz-over'); }
function assetDragLeave(e, id) { document.getElementById(`adz-${id}`)?.classList.remove('adz-over'); }

async function assetDrop(e, sectionId) {
  e.preventDefault();
  document.getElementById(`adz-${sectionId}`)?.classList.remove('adz-over');
  const files = [...(e.dataTransfer.files || [])];
  if (files.length) await processAssetFiles(sectionId, files);
}
async function assetFileInput(e, sectionId) {
  const files = [...(e.target.files || [])];
  e.target.value = '';
  if (files.length) await processAssetFiles(sectionId, files);
}

async function processAssetFiles(sectionId, files) {
  const folderId = getActiveFolderId(sectionId);
  if (!folderId) {
    showToast('Add a Google Drive folder URL to this project or section first.', 'error');
    return;
  }
  const zone = document.getElementById(`adz-${sectionId}`);
  zone?.classList.add('adz-uploading');
  const s = curSections().find(s => String(s.id) === String(sectionId));
  if (!s) { zone?.classList.remove('adz-uploading'); return; }
  if (!s.assets) s.assets = [];
  try {
    const token = await ensureDriveToken();
    for (const file of files) {
      try {
        const fileData = await uploadFileToDrive(file, folderId, token);
        const url = fileData.webViewLink || `https://drive.google.com/file/d/${fileData.id}/view`;
        s.assets.push({ id: generateId(), name: file.name, url, type: file.type });
        showToast(`Uploaded "${file.name}" to Drive`, 'success');
      } catch(err) {
        console.error('[Drive upload]', err);
        showToast('Upload failed: ' + err.message, 'error');
      }
    }
  } catch(err) {
    showToast(err.message, 'error');
  }
  zone?.classList.remove('adz-uploading');
  savePagesData(); render(); scheduleSave();
}

function removeAsset(sectionId, assetId) {
  if (!IS_EDITOR) return;
  const s = curSections().find(s => String(s.id) === String(sectionId));
  if (!s?.assets) return;
  s.assets = s.assets.filter(a => String(a.id) !== String(assetId));
  savePagesData(); render(); scheduleSave();
}

// ─── Section prefix helpers (must be before init() which calls them) ──
const FIGMA_SECTION_PREFIX = '//';

// Single strip helper used everywhere a section name is written.
function stripSectionPrefix(name) {
  if (!name) return '';
  let n = name;
  while (n.startsWith(FIGMA_SECTION_PREFIX)) n = n.slice(FIGMA_SECTION_PREFIX.length).trimStart();
  return n.trim();
}

// ─── Authenticated boot (called after auth.onAuthStateChanged) ─
async function _bootApp() {
  const params = new URLSearchParams(location.search);

  // Load all projects from Firestore
  await loadProjectsFromFirestore();

  // ── ?project=ID — reopen a bookmarked project ──
  const urlProject = params.get('project');
  if (urlProject) {
    const proj = projects.find(p => p.id === urlProject);
    if (proj) { openProject(urlProject); }
    else { renderLibrary(); }
    // Check for local migration after loading
    await migrateLocalStorageToFirestore();
    return;
  }

  // ── ?import=BASE64 — import from Figma plugin ──
  const importParam = params.get('import');
  if (importParam) {
    try {
      console.log('[PluginImport] Received ?import param, length:', importParam.length);
      const decoded = decodeURIComponent(escape(atob(importParam)));
      const data    = JSON.parse(decoded);
      console.log('[PluginImport] Parsed import data:', data.title, '| activePage:', data.activePage,
        '| sections:', data.pages?.[data.activePage]?.sections?.length || 0);
      await handlePluginImport(data);
      return;
    } catch(e) {
      console.error('Design→Dev: failed to parse ?import param', e);
      alert('Plugin import failed — the data may have been corrupted in transit.\n\nTry reducing the number of sections or notes, then click "Open in Handover" again.\n\nError: ' + e.message);
    }
  }

  // ── ?pluginAuth=SESSION — write identity so Figma plugin can confirm sign-in ──
  // Also match this Figma file to an existing project and write the shareToken back
  // so the plugin loads the correct project immediately on first open.
  const pluginAuthSession = params.get('pluginAuth');
  if (pluginAuthSession && currentUser) {
    const _pFk     = params.get('fileKey') || '';
    const _pFu     = params.get('fileUrl') ? decodeURIComponent(params.get('fileUrl')) : '';
    const _pSyncId = params.get('syncId')  || '';
    const _pExtFk  = url => { const m = url?.match(/figma\.com\/(?:design|file)\/([^\/\?#]+)/); return m ? m[1] : null; };
    const _pMatch  =
      projects.find(p => _pFk && _pExtFk(p.generalData?.figmaFileUrl) === _pFk)
      || projects.find(p => _pSyncId && p.pluginSyncId && p.pluginSyncId === _pSyncId);
    const _pPayload = {
      email:       currentUser.email,
      displayName: currentUser.displayName || currentUser.email.split('@')[0]
    };
    if (_pMatch) {
      if (!_pMatch.shareToken) {
        _pMatch.shareToken = Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 6);
        saveProjectToFirestore(_pMatch).catch(() => {});
        publishViewerDoc(_pMatch).catch(() => {});
      }
      _pPayload.shareToken   = _pMatch.shareToken;
      _pPayload.projectTitle = _pMatch.title || '';
      // Backfill figmaFileUrl on the project if it was missing
      if (_pFu && !_pMatch.generalData?.figmaFileUrl) {
        _pMatch.generalData = _pMatch.generalData || {};
        _pMatch.generalData.figmaFileUrl = _pFu;
        saveProjectToFirestore(_pMatch).catch(() => {});
      }
      // Await sync doc writes before writing the auth doc — the plugin may poll the
      // auth doc within milliseconds and immediately look up handover_sync/{fileKey}.
      // If that doc doesn't exist yet (fire-and-forget race) the plugin falls through
      // to "no project found" and shows the wrong state.
      const _pBeacon = { updatedAt: firebase.firestore.FieldValue.serverTimestamp(), updatedBy: currentUser.displayName || currentUser.email, shareToken: _pMatch.shareToken };
      await Promise.all([
        _pFk     ? db.collection('handover_sync').doc(_pFk).set(_pBeacon).catch(() => {})     : Promise.resolve(),
        _pSyncId ? db.collection('handover_sync').doc(_pSyncId).set(_pBeacon).catch(() => {}) : Promise.resolve()
      ]);
    }
    const _pAllProjs = projects
      .filter(p => p.shareToken)
      .map(p => ({ shareToken: p.shareToken, title: p.title || 'Untitled', matchedFile: p === _pMatch }));
    _pPayload.projectsJson = JSON.stringify(_pAllProjs);
    console.log('[PluginAuth] fileKey:', _pFk, '| match:', _pMatch ? `"${_pMatch.title}"` : 'none', '| projects:', _pAllProjs.length);
    await db.collection('handover_sync').doc('plugin_auth_' + pluginAuthSession).set(_pPayload).catch(e => console.warn('[PluginAuth] write failed:', e));
    showToast('Signed in to Figma plugin — you can return to Figma ✓', 'success');
  }

  // ── ?createForFile=KEY — link or create a project for this Figma file ──
  // Checks for an existing project first to avoid duplicates.
  const _createFk = params.get('createForFile');
  const _createFu = params.get('fileUrl') ? decodeURIComponent(params.get('fileUrl')) : '';
  if (_createFk && IS_EDITOR) {
    const _cfExtFk = url => { const m = url?.match(/figma\.com\/(?:design|file)\/([^\/\?#]+)/); return m ? m[1] : null; };
    const _cfExist = projects.find(p => _cfExtFk(p.generalData?.figmaFileUrl) === _createFk);
    if (_cfExist) {
      // Project already linked to this file — just open it
      openProject(_cfExist.id);
    } else {
      // No match — create a new project pre-seeded with the Figma URL
      await newProject({ figmaFileUrl: _createFu });
    }
    return;
  }

  // ── Default: show library ──
  renderLibrary();
  // Offer to migrate any locally-stored projects from before the Firebase upgrade
  await migrateLocalStorageToFirestore();
  // Backfill handover_sync/{fileKey} for projects that have figmaFileUrl set, ensuring
  // the plugin can always find them on first open even before any plugin export has run.
  const _bfExtFk = url => { const m = url?.match(/figma\.com\/(?:design|file)\/([^\/\?#]+)/); return m ? m[1] : null; };
  projects.forEach(_bfP => {
    const _bfFk = _bfExtFk(_bfP.generalData?.figmaFileUrl);
    if (_bfFk && _bfP.shareToken) {
      db.collection('handover_sync').doc(_bfFk).set(
        { updatedAt: firebase.firestore.FieldValue.serverTimestamp(), updatedBy: 'system', shareToken: _bfP.shareToken },
        { merge: true }
      ).catch(() => {});
    }
  });
}

// ─── Confirm replace if page already has sections ──────────────
function confirmFigmaPopulate(pageId) {
  if (!figmaKeys.token) {
    openFigmaTokenModal();
    return;
  }
  if (!pages[pageId]?.figmaUrl) {
    alert('Add a Figma URL for this page first using the ✎ Edit links button.');
    return;
  }

  if (hasSections) {

  }

// ─── Parse Figma URL → { fileKey, nodeId } ────────────────────
function parseFigmaUrl(url) {
  const m = url.match(/figma\.com\/(?:design|file)\/([^\/\?#]+).*[?&]node-id=([\w-]+)/);
  if (!m) return null;
  return { fileKey: m[1], nodeId: m[2].replace('-', ':') };
}

// ─── Fetch frames from Figma API ──────────────────────────────

// Mirrors the plugin's findPrefixedSections — recursively collects
// any frames prefixed with '//', stripping the prefix from display names.
// Always recurses so nested // frames inside a // frame are also found.
function findPrefixedSectionsInApiNode(node, fileKey) {
  const results = [];
  for (const child of (node.children || [])) {
    if (child.visible === false) continue;
    const isContainer = child.type === 'FRAME' || child.type === 'COMPONENT'
                     || child.type === 'GROUP' || child.type === 'SECTION';
    if (!isContainer) continue;
    if (child.name.startsWith(FIGMA_SECTION_PREFIX)) {
      results.push({
        name:      stripSectionPrefix(child.name),
        figmaLink: `https://www.figma.com/design/${fileKey}?node-id=${child.id.replace(':', '-')}`
      });
    }
    // Always recurse — a // frame may itself contain further // frames
    results.push(...findPrefixedSectionsInApiNode(child, fileKey));
  }
  return results;
}

async function fetchFigmaFrames(figmaUrl, token) {
  const parsed = parseFigmaUrl(figmaUrl);
  if (!parsed) throw new Error('Could not parse the Figma URL. Make sure it includes a node-id parameter (e.g. ?node-id=1-2).');
  const { fileKey, nodeId } = parsed;
  const res = await fetch(
    `https://api.figma.com/v1/files/${fileKey}/nodes?ids=${encodeURIComponent(nodeId)}`,
    { headers: { 'X-Figma-Token': token } }
  );
  if (res.status === 403) throw new Error('Figma token rejected — check your Personal Access Token in ⚙ Settings.');
  if (res.status === 404) throw new Error('Figma file or node not found. Double-check the Figma URL in ✎ Edit links.');
  if (!res.ok)           throw new Error(`Figma API error (${res.status}). Please try again.`);
  const data = await res.json();
  const node = data.nodes?.[nodeId]?.document;
  if (!node) throw new Error('No node data returned from Figma. Try refreshing your Figma URL.');

  // 1. Try recursive // prefix search (mirrors plugin behaviour)
  const prefixed = findPrefixedSectionsInApiNode(node, fileKey);
  if (prefixed.length > 0) return prefixed;

  // 2. Fallback: direct visible children (original behaviour)
  const frames = (node.children || []).filter(c =>
    (c.type === 'FRAME' || c.type === 'COMPONENT' || c.type === 'GROUP' || c.type === 'SECTION')
    && c.visible !== false
  );
  if (!frames.length) throw new Error('No visible frames found inside this Figma node. Try selecting a parent frame or page node in Figma and updating the URL.');
  return frames.map(c => ({
    name:      stripSectionPrefix(c.name),
    figmaLink: `https://www.figma.com/design/${fileKey}?node-id=${c.id.replace(':', '-')}`
  }));
}

// ─── Apply frames as sections ──────────────────────────────────
function applyFigmaFrames(pageId) {
  const frames = window._figmaPendingFrames;
  if (!frames) return;
  pages[pageId].sections = frames.map(f => ({
    id:             generateId(),
    name:           stripSectionPrefix(f.name),
    status:         'existing',
    useThemeSpacing: true,
    notes:          '',
    figmaLink:      f.figmaLink,
    driveUrl:       '',
    assets:         [],
    collapsed:      true
  }));
  delete window._figmaPendingFrames;
  savePagesData(); render(); scheduleSave();
  document.querySelector('.overlay')?.remove();
}

            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 17L17 7M17 7H7M17 7V17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Open
          </a>`
        : ''}
    </div>
  </div>`;

  /* ── Fonts section ── */
  h += `
  <div class="general-section">
    <div class="general-section-head">
      <div>
        <div class="general-section-title">Brand &amp; Custom Fonts</div>
        <div class="general-section-desc">List any fonts required that aren't part of the base theme</div>
      </div>
      ${!isReadOnly() ? `<button class="hdr-btn hdr-btn-edit-only general-add" onclick="addFont()" style="background:var(--kbx-yellow);border-color:transparent;color:var(--kbx-black);font-weight:700;display:inline-flex;align-items:center;gap:6px;">
        <iconify-icon icon="pixelarticons:plus" style="font-size:13px"></iconify-icon>
        Add Font
      </button>` : ''}
    </div>
    <div class="font-list">`;

  if (generalData.fonts.length === 0) {
    h += `<div class="typo-empty">${isReadOnly() ? 'No fonts added yet.' : 'No fonts added yet — click <strong>Add Font</strong> to get started.'}</div>`;
  } else {
    generalData.fonts.forEach(f => {
      h += `
      <div class="font-entry">
        <input class="input-text" value="${esc(f.name)}" placeholder="e.g. Neue Haas Grotesk"${isReadOnly() ? ' readonly' : ` onchange="setFontField('${f.id}','name',this.value)"`} style="margin:0;">
        <div class="font-type-group">
          ${['google','adobe','custom'].map(t => `
          <button class="font-type-btn${f.type===t?' active':''}"${isReadOnly() ? ' disabled' : ` onclick="setFontField('${f.id}','type','${t}');render()"`}>${t==='google'?'Google Font':t==='adobe'?'Adobe Font':'Custom Font'}</button>`).join('')}
        </div>
        <button class="font-remove-btn" onclick="removeFont('${f.id}')" title="Remove">✕</button>
      </div>
      ${f.type === 'adobe' ? `
      <div class="font-adobe-row" style="grid-column:1 / -1;margin-top:-4px;">
        <textarea class="input-text" placeholder="Paste Typekit kit ID or embed code (e.g. https://use.typekit.net/xxxxxxx.css) for the developer"${isReadOnly() ? ' readonly' : ` onchange="setFontField('${f.id}','adobeCode',this.value)"`} style="min-height:60px;font-family:monospace;font-size:12px;">${esc(f.adobeCode||'')}</textarea>
      </div>` : ''}`;
    });
  }
  h += `</div></div>`;

  /* ── Typography section — hidden until ready, re-enable by removing the if(false) wrapper ── */
  if (false) { // TODO: re-enable when Figma text styles feature is refined
  h += `
  <div class="general-section">
    <div class="general-section-head">
      <div>
        <div class="general-section-title">Typography Scale</div>
        <div class="general-section-desc">Fetch text styles from your Figma file to give the developer an at-a-glance type hierarchy</div>
      </div>
    </div>`;

  if (!isReadOnly()) {
    h += `
    <div class="typo-url-row">
      <input class="input-text" id="typo-figma-url" value="${esc(generalData.figmaFileUrl)}" placeholder="Paste your Figma file URL (e.g. https://www.figma.com/design/abc123/…)" onchange="generalData.figmaFileUrl=this.value;savePagesData();">
      <button class="typo-fetch-btn" id="typo-fetch-btn" onclick="${figmaKeys.token ? 'fetchTypography()' : 'openFigmaTokenModal()'}">
        ${FIGMA_ICON_SVG}
        ${!figmaKeys.token ? 'Add Figma Token…' : 'Fetch from Figma'}
      </button>
    </div>
    <div class="typo-status" id="typo-status"></div>`;
  }

  if (generalData.typography.length === 0) {
    h += `<div class="typo-empty">${isReadOnly() ? 'No typography data — fetch from Figma in edit mode.' : 'Paste your Figma file URL above and click <strong>Fetch from Figma</strong>.'}</div>`;
  } else {
    h += `<div class="typo-table-wrap"><table class="typo-table">
      <thead><tr>
        <th>Style Name</th><th>Font Family</th><th>Size</th><th>Weight</th><th>Line Height</th>
      </tr></thead><tbody>`;
    generalData.typography.forEach(t => {
      h += `<tr>
        <td><span class="typo-style-name">${esc(t.name)}</span></td>
        <td>${esc(t.family || '—')}</td>
        <td>${t.size ? `<span class="typo-size-chip">${t.size}px</span>` : '—'}</td>
        <td>${t.weight || '—'}</td>
        <td>${t.lineHeight ? esc(t.lineHeight) : '—'}</td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  }
  h += `</div>`;
  } // end if(false)

  h += `</div>`; // close general-wrap
  return h;
}

// ─── Figma plugin import ─────────────────────────────────────
async function handlePluginImport(data) {
  // Extract Figma file key from a URL so we can match projects by file
  const extractFileKey = url => {
    const m = url && url.match(/figma\.com\/(?:design|file)\/([^\/\?#]+)/);
    return m ? m[1] : null;
  };

  const incomingFileKey = extractFileKey(data.figmaFileUrl);

  // Match priority: shareToken (most reliable, set when user picks from picker) →
  // fileKey → pluginSyncId. Skip all matching when plugin signals a fresh start.
  const existingProj = data.isNewProject ? null :
    ( projects.find(p => data.shareToken && p.shareToken && p.shareToken === data.shareToken)
      || projects.find(p => incomingFileKey && extractFileKey(p.generalData?.figmaFileUrl) === incomingFileKey)
      || projects.find(p => data.pluginSyncId && p.pluginSyncId && p.pluginSyncId === data.pluginSyncId) );

  console.log(
    '[PluginImport] fileKey:', incomingFileKey,
    '| match:', existingProj ? `byFileKey → "${existingProj.title}"` : 'none — will create new project',
    '| projects in Firestore:', projects.length
  );

  if (existingProj) {
    // ── Update top-level fields ──
    if (data.title)        existingProj.title      = data.title;
    if (data.theme)        existingProj.theme       = data.theme;
    if (data.activePage)   existingProj.activePage  = data.activePage;
    if (data.figmaFileUrl) existingProj.generalData.figmaFileUrl = data.figmaFileUrl;
    if (data.pluginSyncId) existingProj.pluginSyncId = data.pluginSyncId;
    // Persist frame→page mappings so the plugin can restore them via Pull on any machine
    if (data.frameMappings && Object.keys(data.frameMappings).length > 0) {
      existingProj.frameMappings = data.frameMappings;
    }
    existingProj.updatedAt = Date.now();

    // ── Hide core tabs that the plugin explicitly excluded ──
    // activeTabs lists every non-skip mapped page key from the plugin export.
    // Core tabs not in activeTabs (and with no existing sections) are hidden.
    if (Array.isArray(data.activeTabs)) {
      const activeSet = new Set(data.activeTabs);
      existingProj.hiddenCorePages = CORE_PAGE_KEYS.filter(k =>
        !activeSet.has(k) && !(existingProj.pages[k]?.sections?.length)
      );
    }

    // ── Merge sections for every page included in the export ──
    if (!Array.isArray(existingProj.customPages)) existingProj.customPages = [];

    // Build a label lookup from the plugin's customPageDefs for new tab creation
    const _importedLabels = {};
    (data.customPageDefs || []).forEach(d => { if (d.key) _importedLabels[d.key] = d.label; });

    for (const pageKey of Object.keys(data.pages || {})) {
      // Auto-enable custom tab if needed — use the label the plugin supplied
      if (!CORE_PAGE_KEYS.includes(pageKey) && !existingProj.customPages.find(p => p.key === pageKey)) {
        const label = _importedLabels[pageKey] || null;
        existingProj.customPages.push(
          PRESET_PAGE_KEYS.includes(pageKey) ? { key: pageKey }
          : label                            ? { key: pageKey, label }
          :                                    { key: pageKey, label: pageKey }
        );
      }

      if (!existingProj.pages[pageKey]) existingProj.pages[pageKey] = { loomUrl: '', figmaUrl: '', sections: [] };
      if (data.pages[pageKey]?.figmaUrl) existingProj.pages[pageKey].figmaUrl = data.pages[pageKey].figmaUrl;

      const incomingSections = data.pages[pageKey]?.sections || [];
      const existingSections = existingProj.pages[pageKey].sections || [];
      const existingByLink = {};
      const existingByName = {};
      existingSections.forEach(s => {
        if (s.figmaLink) existingByLink[s.figmaLink] = s;
        if (s.name) existingByName[s.name.toLowerCase().trim()] = s;
      });

      const matchedIds = new Set();
      console.log('[PluginImport] page:', pageKey, '| incoming:', incomingSections.length, '| existing:', existingSections.length);

      const mergedSections = incomingSections.map(incoming => {
        const cleanName = stripSectionPrefix(incoming.name);
        const existing  = existingByLink[incoming.figmaLink]
                       || existingByName[cleanName.toLowerCase().trim()];
        if (!existing) return { ...incoming, name: cleanName, id: generateId() };
        matchedIds.add(existing.id);
        return {
          ...existing,
          name:      cleanName,
          figmaLink: incoming.figmaLink || existing.figmaLink,
          notes:     incoming.notes     || existing.notes,
          status:    incoming.status    || existing.status,
        };
      });
      existingSections.filter(s => !matchedIds.has(s.id)).forEach(s => mergedSections.push(s));
      existingProj.pages[pageKey].sections = mergedSections;
    }

    // Auto-generate share token so sync works immediately
    if (!existingProj.shareToken) {
      existingProj.shareToken = Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 6);
    }
    await saveProjectToFirestore(existingProj);
    await publishViewerDoc(existingProj);
    // Write sync beacon immediately so the plugin can find it
    const syncPayload = {
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy: currentUser?.displayName || currentUser?.email || 'Plugin import',
      shareToken: existingProj.shareToken
    };
    if (existingProj.pluginSyncId) {
      db.collection('handover_sync').doc(existingProj.pluginSyncId).set(syncPayload).catch(() => {});
    }
    if (incomingFileKey) {
      db.collection('handover_sync').doc(incomingFileKey).set(syncPayload).catch(() => {});
    }
    history.replaceState({}, '', '?project=' + existingProj.id);
    openProject(existingProj.id);
    return;
  }

  // ── No matching project found — create a new one ──
  console.log('[PluginImport] Creating new project, fileKey:', incomingFileKey);
  const id = db.collection('handover_projects').doc().id;
  const proj = {
    id,
    title:       data.title  || 'Figma Import',
    theme:       data.theme  || '',
    shareToken:    Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 6),
    pluginSyncId:  data.pluginSyncId || '',
    activePage:  data.activePage || 'homepage',
    createdBy:   currentUser?.uid || '',
    createdByName: currentUser?.displayName || currentUser?.email || '',
    createdAt:   Date.now(),
    updatedAt:   Date.now(),
    pages:       data.pages  || defaultPages(),
    // Build customPages from any non-core keys in the export that have a label
    customPages: (data.customPageDefs || []),
    // Hide core tabs not included in the export
    hiddenCorePages: Array.isArray(data.activeTabs)
      ? CORE_PAGE_KEYS.filter(k => !data.activeTabs.includes(k))
      : [],
    // Persist frame→page mappings so the plugin can restore them via Pull on any machine
    frameMappings: data.frameMappings || {},
    generalData: {
      figmaFileUrl: data.figmaFileUrl || '',
      fonts:        [],
      typography:   []
    }
  };

  Object.keys(PAGE_DEFS).forEach(k => {
    if (!proj.pages[k]) proj.pages[k] = { loomUrl: '', figmaUrl: '', sections: [] };
    (proj.pages[k].sections || []).forEach(s => {
      if (!s.id) s.id = generateId(); else s.id = String(s.id);
      if (s.name) s.name = stripSectionPrefix(s.name);
    });
  });

  projects.unshift(proj);
  await saveProjectToFirestore(proj);
  await publishViewerDoc(proj);
  // Write sync beacon immediately so the plugin can find it
  const importSyncPayload = {
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy: currentUser?.displayName || currentUser?.email || 'Plugin import',
    shareToken: proj.shareToken
  };
  if (proj.pluginSyncId) {
    db.collection('handover_sync').doc(proj.pluginSyncId).set(importSyncPayload).catch(() => {});
  }
  if (incomingFileKey) {
    db.collection('handover_sync').doc(incomingFileKey).set(importSyncPayload).catch(() => {});
  }
  history.replaceState({}, '', '?project=' + id);
  openProject(id);
}

// ─── Legend modal ───────────────────────────────────────────────
function openLegend() {
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  ov.innerHTML = `
  <div class="modal" style="max-width:420px;">
    <div class="modal-head">
      <div class="modal-title">Section Status Legend</div>
      <button class="modal-close" onclick="this.closest('.overlay').remove()">✕</button>
    </div>
    <div class="legend-modal-body">
      ${Object.entries(STATUS_CONFIG).map(([k,v]) => `
      <div class="legend-modal-item">
        <span class="legend-dot ${v.dotCls}"></span>
        <div class="legend-modal-item-text">
          <strong>${v.label}</strong>
          <span>${v.desc}</span>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
  document.body.appendChild(ov);
}

// ─── Font management ────────────────────────────────────────────
function addFont() {
  if (!IS_EDITOR) return;
  generalData.fonts.push({ id: generateId(), name: '', type: 'google' });
  saveCurrentProject();
  render();
}
function removeFont(id) {
  if (!IS_EDITOR) return;
  generalData.fonts = generalData.fonts.filter(f => f.id !== id);
  saveCurrentProject();
  render();
}
function setFontField(id, field, value) {
  if (!IS_EDITOR) return;
  const font = generalData.fonts.find(f => f.id === id);
  if (font) { font[field] = value; saveCurrentProject(); }
}

// ─── Typography fetch from Figma ────────────────────────────────
async function fetchTypography() {
  const url = (document.getElementById('typo-figma-url')?.value || generalData.figmaFileUrl || '').trim();
  if (!url) { setTypoStatus('Please paste a Figma file URL first.', 'error'); return; }

  // Extract file key from Figma URL
  const match = url.match(/figma\.com\/(?:design|file)\/([^\/\?#]+)/);
  if (!match) { setTypoStatus('Could not parse the Figma URL — make sure it\'s a full Figma design link.', 'error'); return; }
  const fileKey = match[1];

  const token = figmaKeys.token;
  if (!token) { setTypoStatus('No Figma token — add one in \u2699 Settings.', 'error'); return; }

  generalData.figmaFileUrl = url;

  const btn = document.getElementById('typo-fetch-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Fetching\u2026'; }
  setTypoStatus('Fetching text styles from Figma\u2026');

  try {
    // Step 1: Get all styles in the file
    const stylesRes = await fetch(`https://api.figma.com/v1/files/${fileKey}/styles`, {
      headers: { 'X-Figma-Token': token }
    });
    if (stylesRes.status === 403) throw new Error('Figma token rejected — check your Personal Access Token in \u2699 Settings.');
    if (stylesRes.status === 404) throw new Error('Figma file not found — check the URL.');
    if (!stylesRes.ok) throw new Error(`Figma API error (${stylesRes.status})`);

    const stylesData = await stylesRes.json();
    const textStyles = (stylesData.meta?.styles || []).filter(s => s.style_type === 'TEXT');

    if (!textStyles.length) {
      setTypoStatus('No text styles found in this Figma file.', 'warn');
      if (btn) { btn.disabled = false; btn.innerHTML = FIGMA_ICON_SVG + ' Fetch from Figma'; }
      return;
    }

    setTypoStatus(`Found ${textStyles.length} text style${textStyles.length!==1?'s':''}. Fetching properties\u2026`);

    // Step 2: Fetch the actual node properties for each style
    // Figma limits node fetches — batch into groups of 50
    const nodeIds = textStyles.map(s => s.node_id);
    const batches = [];
    for (let i = 0; i < nodeIds.length; i += 50) batches.push(nodeIds.slice(i, i + 50));

    const nodeMap = {};
    for (const batch of batches) {
      const nodesRes = await fetch(
        `https://api.figma.com/v1/files/${fileKey}/nodes?ids=${encodeURIComponent(batch.join(','))}`,
        { headers: { 'X-Figma-Token': token } }
      );
      if (!nodesRes.ok) throw new Error(`Failed to fetch node properties (${nodesRes.status})`);
      const nodesData = await nodesRes.json();
      Object.assign(nodeMap, nodesData.nodes || {});
    }

    // Step 3: Extract typography properties
    const results = textStyles.map(style => {
      const nodeData = nodeMap[style.node_id]?.document;
      const ts = nodeData?.style || {};
      let lineHeight = '—';
      if (ts.lineHeightUnit === 'PERCENT') {
        lineHeight = Math.round(ts.lineHeightPercentFontSize || 0) + '%';
      } else if (ts.lineHeightUnit === 'PIXELS') {
        lineHeight = Math.round(ts.lineHeightPx || 0) + 'px';
      } else if (ts.lineHeightPercentFontSize) {
        lineHeight = Math.round(ts.lineHeightPercentFontSize) + '%';
      }
      return {
        name:       style.name,
        family:     ts.fontFamily || '',
        size:       ts.fontSize ? Math.round(ts.fontSize) : null,
        weight:     ts.fontWeight || '',
        lineHeight: lineHeight !== '—' ? lineHeight : ''
      };
    });

    // Sort: prioritise heading-like names first
    results.sort((a, b) => {
      const headingRe = /^(h[1-6]|heading|display|title|hero)/i;
      const aH = headingRe.test(a.name), bH = headingRe.test(b.name);
      if (aH !== bH) return aH ? -1 : 1;
      return a.name.localeCompare(b.name);
    });

    generalData.typography = results;
    saveCurrentProject();
    setTypoStatus(`\u2713 Loaded ${results.length} text style${results.length!==1?'s':''}. `, 'ok');
    render();

  } catch(err) {
    setTypoStatus(err.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = FIGMA_ICON_SVG + ' Fetch from Figma'; }
  }
}

function setTypoStatus(msg, type) {
  const el = document.getElementById('typo-status');
  if (!el) return;
  const color = type === 'error' ? '#F87171' : type === 'ok' ? '#2EAB42' : type === 'warn' ? '#D97706' : 'var(--text-sub)';
  el.style.color = color;
  el.textContent = msg;
}

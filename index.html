    html, body { height: 100%; background: #141416; overflow: hidden; }
    /* Full-page viewer iframe */
    #viewer-frame {
      display: none; width: 100%; height: 100vh; border: none;
    }
    /* Neutral landing — shown when no ?gist= param */
    #landing {
      display: none; align-items: center; justify-content: center;
      height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff; padding: 24px; text-align: center;
    }
    .landing-inner { max-width: 340px; }
    .landing-logo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 32px;
    }
    .landing-logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .landing-logo-sub { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
    .landing-title {
      font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 12px; color: #fff;
    }
    .landing-desc {
      font-size: 14px; line-height: 1.65; color: #6E6E74; margin-bottom: 28px;
    }
    .landing-pill {
      display: inline-block; background: #28282B; border: 1px solid #3E3E42;
      border-radius: 99px; padding: 8px 18px; font-size: 12px; color: #A0A0A6;
    }
  </style>

  <script>
    const params = new URLSearchParams(location.search);
    const gist   = params.get('gist');
    const imp    = params.get('import');
    const proj   = params.get('project');

    if (imp || proj) {
      // Plugin import or project bookmark — redirect to editor directly
      // (these are editor-only flows, not viewer flows)
      location.replace('design-to-dev-handover-v3-figma.html' + location.search);
    } else if (gist) {
      const frame = document.getElementById('viewer-frame');
      frame.src = 'design-to-dev-handover-v3-figma.html?gist=' + encodeURIComponent(gist);
      frame.style.display = 'block';
    } else {
      document.getElementById('landing').style.display = 'flex';
    }
  </script>
